<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" role="img" aria-label="布偶貓全身走路插畫">
  <defs>
    <linearGradient id="bodyFur" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset=".55" stop-color="#f2e3d1"/>
      <stop offset="1" stop-color="#dec7ad"/>
    </linearGradient>
    <linearGradient id="pointFur" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9b8068"/>
      <stop offset="1" stop-color="#6f5745"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#56351f" flood-opacity=".18"/>
    </filter>
    <style>
      .body-bob { animation: bodyBob .9s ease-in-out infinite; transform-origin: 310px 190px; }
      .tail { animation: tailSwing 1.4s ease-in-out infinite; transform-origin: 435px 152px; }
      .leg-a { animation: legStepA .9s ease-in-out infinite; transform-origin: 185px 264px; }
      .leg-b { animation: legStepB .9s ease-in-out infinite; transform-origin: 284px 267px; }
      .leg-c { animation: legStepB .9s ease-in-out infinite; transform-origin: 375px 267px; }
      .leg-d { animation: legStepA .9s ease-in-out infinite; transform-origin: 448px 258px; }
      .paw { animation: pawSquish .9s ease-in-out infinite; transform-origin: center; }
      .paw.alt { animation-delay: .45s; }

      @keyframes bodyBob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @keyframes tailSwing {
        0%, 100% { transform: rotate(-4deg); }
        50% { transform: rotate(8deg); }
      }
      @keyframes legStepA {
        0%, 100% { transform: rotate(7deg) translateY(0); }
        50% { transform: rotate(-9deg) translateY(-5px); }
      }
      @keyframes legStepB {
        0%, 100% { transform: rotate(-8deg) translateY(-4px); }
        50% { transform: rotate(8deg) translateY(0); }
      }
      @keyframes pawSquish {
        0%, 100% { transform: scaleX(1.08) scaleY(.92); }
        50% { transform: scaleX(.96) scaleY(1.06); }
      }
    </style>
  </defs>

  <ellipse cx="315" cy="318" rx="230" ry="24" fill="#56351f" opacity=".12"/>

  <g filter="url(#softShadow)">
    <g class="tail">
      <path d="M458 196c34-18 51-47 43-75-8-30-41-45-65-28-18 13-19 37-4 48 12 9 28 5 34-8" fill="none" stroke="url(#pointFur)" stroke-width="24" stroke-linecap="round"/>
    </g>

    <g class="body-bob">
      <path d="M160 168c22-64 91-91 169-82 92 10 158 67 151 139-6 63-69 91-170 91-95 0-169-29-171-88-1-23 7-43 21-60z" fill="url(#bodyFur)"/>

      <g class="leg-a">
        <path d="M190 278c8 43-18 55-49 38-8-5-8-16 1-21 14-7 28-16 35-33z" fill="#8a6c58"/>
        <ellipse class="paw" cx="147" cy="315" rx="27" ry="13" fill="#8a6c58"/>
      </g>
      <g class="leg-b">
        <path d="M289 285c2 42-27 50-56 28-8-6-6-18 4-21 16-5 29-13 38-27z" fill="#f8efe4"/>
        <ellipse class="paw alt" cx="238" cy="314" rx="27" ry="13" fill="#f8efe4"/>
      </g>
      <g class="leg-c">
        <path d="M382 286c9 39-17 52-50 34-9-5-9-17 1-22 15-7 28-17 34-33z" fill="#f8efe4"/>
        <ellipse class="paw" cx="335" cy="319" rx="27" ry="13" fill="#f8efe4"/>
      </g>
      <g class="leg-d">
        <path d="M458 272c21 32 4 56-36 50-11-2-15-15-7-23 11-11 19-24 21-39z" fill="#8a6c58"/>
        <ellipse class="paw alt" cx="429" cy="321" rx="27" ry="13" fill="#8a6c58"/>
      </g>

      <path d="M151 168c-27-54-8-87 54-48 23-13 52-18 82-14 55-42 89-23 74 43 23 23 31 63 16 96-19 43-64 64-116 62-58-3-105-33-120-80-8-24-4-45 10-59z" fill="#fff6ea"/>
      <path d="M178 150c-20-43-9-54 31-27-14 6-24 16-31 27z" fill="url(#pointFur)"/>
      <path d="M320 144c30-31 44-23 29 19-8-8-17-14-29-19z" fill="url(#pointFur)"/>

      <path d="M175 191c24-28 48-40 77-39 33 1 63 17 88 49-15 18-43 28-86 27-43-1-68-12-79-37z" fill="#8a6c58" opacity=".7"/>
      <circle cx="219" cy="199" r="11" fill="#2d211d"/>
      <circle cx="291" cy="199" r="11" fill="#2d211d"/>
      <circle cx="223" cy="195" r="3.5" fill="#fff"/>
      <circle cx="295" cy="195" r="3.5" fill="#fff"/>
      <path d="M254 216c11 0 15 6 0 16-15-10-11-16 0-16z" fill="#d99698"/>
      <path d="M253 230c-6 13-21 13-27 4M256 230c6 13 21 13 27 4" fill="none" stroke="#2d211d" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M170 221h-48M176 238h-49M339 221h48M333 238h50" stroke="#8a6c58" stroke-width="4.5" stroke-linecap="round"/>

      <path d="M126 198c-32 7-54 29-54 55 0 28 26 45 57 34 16-6 25-18 33-33" fill="none" stroke="#8a6c58" stroke-width="18" stroke-linecap="round"/>
      <circle cx="144" cy="301" r="14" fill="#f0b8b7"/>
      <circle cx="169" cy="292" r="13" fill="#f0b8b7"/>
      <circle cx="193" cy="301" r="14" fill="#f0b8b7"/>
      <path d="M158 322c10-18 24-18 34 0l7 12c7 13-4 23-18 16-8-4-16-4-24 0-15 7-25-3-18-16z" fill="#f0b8b7"/>
    </g>
  </g>
</svg>
