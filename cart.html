<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>購物車｜凱莉日嚐</title>
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body data-page="cart">
    <header class="site-header">
      <div class="utility-row">
        <a class="utility-link" href="index.html#menu">繼續逛逛</a>
        <a class="cart-link active" href="cart.html">購物車 <span data-cart-count>0</span></a>
      </div>
      <a class="brand" href="index.html">
        <img src="assets/images/caily-logo.png" alt="Caily Cafe logo">
        <span>CAILY CAFE</span>
        <small>凱莉日嚐</small>
      </a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">選單</button>
      <nav id="site-nav" class="site-nav">
        <a href="index.html#menu">限時蛋糕</a>
        <div class="nav-dropdown">
          <a href="index.html#desserts">蛋糕甜點</a>
          <div class="dropdown-menu mega-menu">
            <a href="index.html#birthday-cakes">生日蛋糕</a>
            <a href="index.html#tart-cakes">6吋塔</a>
            <a href="index.html#roll-cakes">長條捲</a>
          </div>
        </div>
        <a href="admin.html">後台管理</a>
        <a href="index.html#cat-schedule">貓咪班表</a>
      </nav>
    </header>

    <main>
      <section class="page-hero">
        <p class="eyebrow">Cart</p>
        <h1>購物車</h1>
        <p>這裡會暫存你加入的商品，資料保存在這台電腦的瀏覽器中。</p>
      </section>
      <section class="section cart-layout">
        <div data-cart-items></div>
        <aside class="cart-summary">
          <h2>訂單暫存</h2>
          <p>合計：<strong data-cart-total>NT$0</strong></p>
          <button class="button wide" type="button" data-clear-cart>清空購物車</button>
          <a class="button wide dark" href="index.html#checkout">前往結帳</a>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 凱莉日嚐 Caily Cafe</p>
      <a href="index.html">回首頁</a>
    </footer>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/site.js"></script>
  </body>
</html>
